<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>患者花名册管理器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(135deg,#faf6f3,#f5ede5); min-height: 100vh; padding: 20px; }
    .container { max-width: 680px; margin: 0 auto; background: white; border-radius: 24px; padding: 40px; box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
    .back-link { color: #dfa0c0; text-decoration: none; font-weight: 600; display: inline-block; margin-bottom: 24px; }
    .back-link:hover { color: #d47fa0; }
    h1 { color: #d47fa0; font-size: 1.9rem; margin-bottom: 6px; }
    .subtitle { color: #9b9b9b; font-size: 0.92rem; margin-bottom: 28px; }
    .tag { display: inline-block; background: rgba(232,180,204,0.15); color: #d47fa0; font-size: 0.75rem; font-weight: 700; padding: 4px 12px; border-radius: 10px; margin-bottom: 20px; letter-spacing: 0.04em; }

    .form-card { background: linear-gradient(135deg,#fff9fb,#fff2f8); border-radius: 16px; padding: 24px; margin-bottom: 24px; border: 2px solid rgba(232,180,204,0.15); }
    .form-title { font-size: 0.78rem; font-weight: 700; color: #dfa0c0; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: #6e6e73; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 13px; border: 2px solid rgba(232,180,204,0.35); border-radius: 11px; font-size: 0.95rem; transition: border-color 0.2s; }
    input:focus { outline: none; border-color: #dfa0c0; box-shadow: 0 0 0 3px rgba(223,160,192,0.1); }

    .search-row { display: flex; gap: 10px; }
    .search-row input { flex: 1; }

    .btn { padding: 11px 22px; border: none; border-radius: 14px; font-size: 0.92rem; font-weight: 700; cursor: pointer; transition: all 0.25s; font-family: inherit; }
    .btn-primary { background: linear-gradient(135deg,#e8b4cc,#dfa0c0); color: white; width: 100%; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(232,180,204,0.35); }
    .btn-search { background: linear-gradient(135deg,#e8b4cc,#dfa0c0); color: white; white-space: nowrap; }
    .btn-search:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(232,180,204,0.3); }

    .section-title { font-size: 0.8rem; font-weight: 700; color: #9b9b9b; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; margin-top: 4px; }
    .empty { text-align: center; color: #bbb; padding: 32px; font-size: 0.95rem; }

    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { background: linear-gradient(135deg,#e8b4cc,#dfa0c0); color: white; padding: 10px 14px; text-align: left; font-weight: 700; }
    th:first-child { border-radius: 10px 0 0 0; }
    th:last-child { border-radius: 0 10px 0 0; }
    td { padding: 10px 14px; border-bottom: 1px solid #f5ede5; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(232,180,204,0.06); }

    .del-btn { background: none; border: 1px solid rgba(232,180,204,0.4); color: #d47fa0; padding: 4px 12px; border-radius: 8px; cursor: pointer; font-size: 0.82rem; font-weight: 600; transition: all 0.2s; }
    .del-btn:hover { background: #ffebee; border-color: #ef9a9a; color: #c62828; }

    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #2d2d2d; color: white; padding: 12px 24px; border-radius: 20px; font-size: 0.9rem; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }

    .search-result { background: rgba(232,180,204,0.1); border-radius: 12px; padding: 14px 18px; margin-top: 10px; border-left: 4px solid #dfa0c0; display: none; font-size: 0.92rem; line-height: 1.7; }
    .search-result.show { display: block; animation: slideIn 0.3s ease; }
    .err { border-left-color: #ef9a9a; background: #fff5f5; color: #c62828; }
    @keyframes slideIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .count-badge { display: inline-block; background: rgba(232,180,204,0.2); color: #d47fa0; font-size: 0.78rem; font-weight: 700; padding: 2px 10px; border-radius: 10px; margin-left: 8px; }
  </style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">← 返回首页</a>
  <div class="tag">练习 1 · 字典 + 循环 + 异常处理</div>
  <h1>📋 患者花名册管理器</h1>
  <p class="subtitle">录入、查询、删除患者信息 — 数据保存于本地浏览器</p>

  <!-- 添加患者 -->
  <div class="form-card">
    <div class="form-title">➕ 添加患者</div>
    <div class="grid-3">
      <div><label>患者姓名 *</label><input id="addName" placeholder="例：张三" /></div>
      <div><label>病床号 *</label><input id="addBed" placeholder="例：A-12" /></div>
      <div><label>入院日期 *</label><input id="addDate" type="date" /></div>
    </div>
    <button class="btn btn-primary" onclick="addPatient()">✅ 添加患者</button>
  </div>

  <!-- 查询患者 -->
  <div class="form-card">
    <div class="form-title">🔍 查询患者</div>
    <div class="search-row">
      <input id="searchName" placeholder="输入患者姓名搜索..." />
      <button class="btn btn-search" onclick="searchPatient()">查询</button>
    </div>
    <div class="search-result" id="searchResult"></div>
  </div>

  <!-- 患者列表 -->
  <div class="section-title">
    全部患者
    <span class="count-badge" id="countBadge">0 人</span>
  </div>
  <div id="rosterWrap">
    <div class="empty" id="emptyMsg">暂无患者记录</div>
    <table id="rosterTable" style="display:none">
      <thead>
        <tr><th>姓名</th><th>病床号</th><th>入院日期</th><th>操作</th></tr>
      </thead>
      <tbody id="rosterBody"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const KEY = 'nursing_roster';
  let patients = JSON.parse(localStorage.getItem(KEY) || '{}');

  function save() { localStorage.setItem(KEY, JSON.stringify(patients)); }

  function render() {
    const names = Object.keys(patients);
    document.getElementById('countBadge').textContent = names.length + ' 人';
    document.getElementById('emptyMsg').style.display = names.length ? 'none' : '';
    const table = document.getElementById('rosterTable');
    table.style.display = names.length ? '' : 'none';
    document.getElementById('rosterBody').innerHTML = names.map(name => {
      const p = patients[name];
      return `<tr>
        <td><strong>${name}</strong></td>
        <td>${p.bed}</td>
        <td>${p.date}</td>
        <td><button class="del-btn" onclick="deletePatient('${name}')">删除</button></td>
      </tr>`;
    }).join('');
  }

  function addPatient() {
    const name = document.getElementById('addName').value.trim();
    const bed  = document.getElementById('addBed').value.trim();
    const date = document.getElementById('addDate').value;
    if (!name || !bed || !date) { showToast('⚠️ 请填写完整信息'); return; }
    if (patients[name]) { showToast('⚠️ 该患者已存在'); return; }
    patients[name] = { bed, date };
    save(); render();
    document.getElementById('addName').value = '';
    document.getElementById('addBed').value = '';
    document.getElementById('addDate').value = '';
    showToast('✅ 已添加患者：' + name);
  }

  function searchPatient() {
    const name = document.getElementById('searchName').value.trim();
    const box  = document.getElementById('searchResult');
    if (!name) { box.className = 'search-result'; return; }
    if (patients[name]) {
      const p = patients[name];
      box.innerHTML = `<strong>✅ 找到患者</strong><br>姓名：${name}<br>床位：${p.bed}<br>入院：${p.date}`;
      box.className = 'search-result show';
    } else {
      box.innerHTML = '❌ 未找到该患者：' + name;
      box.className = 'search-result show err';
    }
  }

  function deletePatient(name) {
    if (!confirm(`确认删除患者「${name}」？`)) return;
    delete patients[name];
    save(); render();
    document.getElementById('searchResult').className = 'search-result';
    showToast('🗑️ 已删除：' + name);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  document.getElementById('searchName').addEventListener('keypress', e => { if (e.key === 'Enter') searchPatient(); });
  document.getElementById('addDate').valueAsDate = new Date();
  render();
</script>
</body>
</html>
