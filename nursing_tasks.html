<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>护理任务清单</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(135deg,#faf6f3,#f5ede5); min-height: 100vh; padding: 20px; }
    .container { max-width: 620px; margin: 0 auto; background: white; border-radius: 24px; padding: 40px; box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
    .back-link { color: #dfa0c0; text-decoration: none; font-weight: 600; display: inline-block; margin-bottom: 24px; }
    .back-link:hover { color: #d47fa0; }
    h1 { color: #d47fa0; font-size: 1.9rem; margin-bottom: 6px; }
    .subtitle { color: #9b9b9b; font-size: 0.92rem; margin-bottom: 20px; }
    .tag { display: inline-block; background: rgba(232,180,204,0.15); color: #d47fa0; font-size: 0.75rem; font-weight: 700; padding: 4px 12px; border-radius: 10px; margin-bottom: 20px; letter-spacing: 0.04em; }

    .add-row { display: flex; gap: 10px; margin-bottom: 28px; }
    .add-row input { flex: 1; padding: 12px 16px; border: 2px solid rgba(232,180,204,0.35); border-radius: 14px; font-size: 0.96rem; font-family: inherit; transition: border-color 0.2s; }
    .add-row input:focus { outline: none; border-color: #dfa0c0; box-shadow: 0 0 0 3px rgba(223,160,192,0.1); }
    .btn-add { padding: 12px 22px; background: linear-gradient(135deg,#e8b4cc,#dfa0c0); color: white; border: none; border-radius: 14px; font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; transition: all 0.25s; }
    .btn-add:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(232,180,204,0.35); }

    .filter-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .filter-btn { padding: 7px 18px; border: 2px solid rgba(232,180,204,0.3); border-radius: 20px; background: white; color: #9b9b9b; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .filter-btn.active { background: linear-gradient(135deg,#e8b4cc,#dfa0c0); color: white; border-color: #dfa0c0; }

    .stats-mini { display: flex; gap: 16px; margin-bottom: 20px; }
    .stat { font-size: 0.85rem; color: #9b9b9b; }
    .stat span { font-weight: 700; color: #d47fa0; }

    .task-list { display: flex; flex-direction: column; gap: 10px; }
    .task-item {
      display: flex; align-items: center; gap: 14px;
      background: linear-gradient(135deg,#fff9fb,#fff2f8);
      border-radius: 14px; padding: 14px 16px;
      border: 2px solid rgba(232,180,204,0.12);
      transition: all 0.25s; animation: slideIn 0.3s ease;
    }
    .task-item.done { opacity: 0.55; background: #f9f9f9; border-color: rgba(0,0,0,0.05); }
    @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .task-check {
      width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid #e8b4cc; background: white; cursor: pointer;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; font-size: 0.85rem;
    }
    .task-check.checked { background: linear-gradient(135deg,#e8b4cc,#dfa0c0); border-color: #dfa0c0; color: white; }
    .task-check:hover { transform: scale(1.15); }

    .task-text { flex: 1; font-size: 0.95rem; color: #2d2d2d; line-height: 1.4; }
    .task-item.done .task-text { text-decoration: line-through; color: #bbb; }

    .task-time { font-size: 0.75rem; color: #bbb; white-space: nowrap; flex-shrink: 0; }
    .task-del { background: none; border: none; color: #ccc; cursor: pointer; font-size: 1rem; padding: 4px; border-radius: 6px; transition: all 0.2s; flex-shrink: 0; }
    .task-del:hover { color: #ef5350; background: #ffebee; }

    .empty { text-align: center; color: #ccc; padding: 40px 20px; font-size: 0.95rem; }
    .empty .emoji { font-size: 2.5rem; margin-bottom: 8px; }

    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #2d2d2d; color: white; padding: 12px 24px; border-radius: 20px; font-size: 0.9rem; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }

    .clear-done { font-size: 0.82rem; color: #bbb; cursor: pointer; text-decoration: underline; margin-left: auto; }
    .clear-done:hover { color: #d47fa0; }
  </style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">← 返回首页</a>
  <div class="tag">练习 3 · 列表 + 本地存储 + 异常处理</div>
  <h1>✅ 护理任务清单</h1>
  <p class="subtitle">添加当班任务，数据自动保存，刷新后不丢失</p>

  <div class="add-row">
    <input id="taskInput" placeholder="输入护理任务，例：为 12 床换药..." maxlength="100" />
    <button class="btn-add" onclick="addTask()">➕ 添加</button>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" id="f-all"     onclick="setFilter('all')">全部</button>
    <button class="filter-btn"        id="f-pending" onclick="setFilter('pending')">待完成</button>
    <button class="filter-btn"        id="f-done"    onclick="setFilter('done')">已完成</button>
    <span class="clear-done" onclick="clearDone()">清除已完成</span>
  </div>

  <div class="stats-mini">
    <div class="stat">待完成 <span id="pendingCount">0</span></div>
    <div class="stat">已完成 <span id="doneCount">0</span></div>
    <div class="stat">共 <span id="totalCount">0</span> 项</div>
  </div>

  <div class="task-list" id="taskList"></div>
  <div class="empty" id="emptyMsg" style="display:none">
    <div class="emoji">🌸</div>
    暂无任务，添加一个开始吧
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const KEY = 'nursing_tasks_v2';
  let tasks  = JSON.parse(localStorage.getItem(KEY) || '[]');
  let filter = 'all';

  function save()  { localStorage.setItem(KEY, JSON.stringify(tasks)); }

  function render() {
    const pending = tasks.filter(t => !t.done).length;
    const done    = tasks.filter(t =>  t.done).length;
    document.getElementById('pendingCount').textContent = pending;
    document.getElementById('doneCount').textContent    = done;
    document.getElementById('totalCount').textContent   = tasks.length;

    let visible = tasks;
    if (filter === 'pending') visible = tasks.filter(t => !t.done);
    if (filter === 'done')    visible = tasks.filter(t =>  t.done);

    document.getElementById('emptyMsg').style.display = visible.length ? 'none' : '';
    document.getElementById('taskList').innerHTML = visible.map(t => `
      <div class="task-item ${t.done ? 'done' : ''}">
        <div class="task-check ${t.done ? 'checked' : ''}" onclick="toggleTask('${t.id}')">
          ${t.done ? '✓' : ''}
        </div>
        <div class="task-text">${t.text}</div>
        <div class="task-time">${t.time}</div>
        <button class="task-del" onclick="deleteTask('${t.id}')" title="删除">✕</button>
      </div>
    `).join('');
  }

  function addTask() {
    const text = document.getElementById('taskInput').value.trim();
    if (!text) { showToast('⚠️ 请输入任务内容'); return; }
    tasks.unshift({
      id:   Date.now().toString(),
      text: text,
      done: false,
      time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
    });
    save(); render();
    document.getElementById('taskInput').value = '';
    showToast('✅ 已添加任务');
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
    showToast('🗑️ 已删除');
  }

  function clearDone() {
    const count = tasks.filter(t => t.done).length;
    if (!count) { showToast('没有已完成的任务'); return; }
    tasks = tasks.filter(t => !t.done);
    save(); render();
    showToast(`已清除 ${count} 项已完成任务`);
  }

  function setFilter(f) {
    filter = f;
    ['all','pending','done'].forEach(k => {
      document.getElementById('f-' + k).classList.toggle('active', k === f);
    });
    render();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  document.getElementById('taskInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
